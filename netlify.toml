[build]
  command = "composer install --no-dev --optimize-autoloader --no-scripts"
  publish = "public"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[plugins]]
  package = "./netlify/plugins/netlify-plugin-php"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/index"
  status = 200
  force = true