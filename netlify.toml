[build]
  command = "composer install --no-dev --optimize-autoloader --no-scripts"
  publish = "public"

[functions]
  included_files = ["app/**", "config/**", "database/**", "resources/**", "routes/**", "vendor/**", ".env"]

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/index"
  status = 200
  force = true